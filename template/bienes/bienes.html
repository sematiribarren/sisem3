{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienes</title>
    <link rel="stylesheet" href="{% static 'css/home.css' %}" />
    <link rel="stylesheet" href="{% static 'css/datatables.css' %}" />
    <link rel="stylesheet" href="{% static 'css/index.css' %}" />
    <link rel="stylesheet" href="{% static 'css/tooltip2.css' %}" />
    <link rel="stylesheet" href="{% static 'css/sweetalert.min.css' %}" />
    <script src="/static/js/datatables.js"></script>
    <script src="/static/js/sweetalert.min.js"></script>
    <script src="/static/js/jquery-3.7.0.min.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    {% if user.is_authenticated == 0 %}
    <meta http-equiv="refresh" content="0;url={% url 'login' %}" />
    {% endif %} {% if messages%} {% for m in messages %}
    <script>
      Swal.fire({
        title: "Felicidades",
        text: "{{m}}",
        icon: "success",
      });
    </script>
    {% endfor %} {% endif %} {% include 'header.html' %}
    <main class="data-table">
      <h1>Listado de Bienes</h1>

      <table id="DataTable">
        <thead>
          <tr>
            <th>BM</th>
            <th>Descripcion</th>
            <th>Partes</th>
            <th>Status</th>
            <th>Acciones</th>
          </tr>
        </thead>
      </table>
    </main>
    <script src="/static/js/datatables.js"></script>
    <script>
      $(document).ready(function () {
        $("#DataTable").DataTable({
          responsive: true,
          dom: '<"table-options"<"lb-container"lB>fr>tip',
          lengthMenu: [10, 25, 50, -1],
          buttons: [
            {
              text: "Añadir nuevo registro",
              className: "btn-new",
              action: (e) => {
                window.location.href = "";
              },
            },
            {
              text: "Bienes separados",
              className: "btn-new",
              action: (e) => {
                window.location.href = "";
              },
            },
            {
              text: "Areas",
              className: "btn-new",
              action: (e) => {
                window.location.href = "";
              },
            },
            {
              extend: "excel",
              filename: " BIENES-EXCEL",
              exportOptions: {
                columns: [0, 1, 2, 3, 4, 5],
              },
            },
            {
              extend: "pdf",
              filename: " BIENES-PDF",
              exportOptions: {
                columns: [0, 1, 2, 3, 4, 5],
              },
            },
          ],
          ajax: "{% url 'lista_bienes' %}",
          columns: [
            { data: "bm" },
            { data: "descripcion" },
            { data: "partes" },
            { data: "status" },
            {
              data: null,
              searchable: false,
              orderable: false,
              defaultContent:
                "<button class='actions edit'><svg  xmlns='http://www.w3.org/2000/svg'  width='24'  height='24'  viewBox='0 0 24 24'  fill='none'  stroke='currentColor'  stroke-width='2'  stroke-linecap='round'  stroke-linejoin='round'  class='icon icon-tabler icons-tabler-outline icon-tabler-edit'><path stroke='none' d='M0 0h24v24H0z' fill='none'/><path d='M7 7h-1a2 2 0 0 0 -2 2v9a2 2 0 0 0 2 2h9a2 2 0 0 0 2 -2v-1' /><path d='M20.385 6.585a2.1 2.1 0 0 0 -2.97 -2.97l-8.415 8.385v3h3l8.385 -8.415z' /><path d='M16 5l3 3' /></svg></button> <button class='actions delete'> <svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='currentColor' class='bi bi-plus' viewBox='0 0 16 16'><path d='M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4'/></svg></button> <button class='actions delete'> <svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='currentColor' class='bi bi-eye' viewBox='0 0 16 16'><path d='M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z'/><path d='M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0'/></svg></button> <button class='actions delete'> <svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' fill='currentColor' class='bi bi-trash' viewBox='0 0 16 16'><path d='M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z'/><path d='M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z'/></svg></button>",
            },
          ],
          initComplete: function (settings, json) {
            $("#DataTable tbody").delegate(
              ".actions.edit",
              "click",
              function () {
                var data = $("#DataTable")
                  .DataTable()
                  .row($(this).parents("tr"))
                  .data();
                var id = data.id;
                window.location.href = "" + id;
              },
            );
            $("#DataTable tbody").delegate(
              ".actions.delete",
              "click",
              function () {
                var data = $("#DataTable")
                  .DataTable()
                  .row($(this).parents("tr"))
                  .data();
                var id = data.id;
                window.location.href = "{% url 'add_bien' id=1 %}".replace(
                  "1",
                  id,
                );
              },
            );
          },
          success: function (response) {
            console.log("Datos recibidos:", response);
          },
          error: function (xhr, status, error) {
            console.error("Error al recibir datos:", error);
          },
        });
      });
    </script>
  </body>
</html>
