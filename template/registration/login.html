{% load static %}
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SISEM 3.0 · Acceso</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-wrapper">
      <div class="login-card">
        <div class="logo-container">
          <img
            src="{% static 'image/semat_logo.png' %}"
            alt="Logo de la empresa"
            style="border-radius: 12px"
          />
        </div>

        <form method="post">
          {% csrf_token %}
          <!-- Campo Usuario con icono -->
          <div class="input-group">
            <div class="input-label">
              <i class="bi bi-person-circle"></i>
              <span>Usuario</span>
            </div>
            <div class="input-field">
              <i class="bi bi-person"></i>
              <input
                name="username"
                id="username"
                required
                type="text"
                placeholder="Ingresa tu usuario"
                autocomplete="username"
              />
            </div>
          </div>

          <!-- Campo Contraseña con icono -->
          <div class="input-group">
            <div class="input-label">
              <i class="bi bi-shield-lock"></i>
              <span>Contraseña</span>
            </div>
            <div class="input-field">
              <i class="bi bi-lock"></i>
              <input
                name="password"
                id="password"
                required
                type="password"
                placeholder="••••••••"
                autocomplete="current-password"
              />
            </div>
          </div>

          <!-- BOTÓN ÚNICO DE INICIO DE SESIÓN -->
          <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right"></i>
            Iniciar Sesión
          </button>

          <!-- Pequeño divisor decorativo -->
          <div class="divider">
            <span class="divider-line"></span>
            <i class="bi bi-dot" style="color: #4f46e5"></i>
            <span class="divider-line"></span>
          </div>

          <!-- VERSIÓN DEL SISTEMA (SISEM 3.0) -->
          <div class="system-version">
            <div class="version-badge">
              <i class="bi bi-cpu"></i>
              SISEM
              <span>3.0</span>
            </div>
          </div>
        </form>
      </div>

      <!-- Texto pequeño de seguridad (opcional) -->
      <div
        style="
          text-align: center;
          margin-top: 1.5rem;
          font-size: 0.8rem;
          color: #94a3b8;
        "
      >
        <i class="bi bi-shield-check" style="margin-right: 0.3rem"></i>
        Acceso seguro · Sistema validado
      </div>
    </div>
  </body>
</html>
